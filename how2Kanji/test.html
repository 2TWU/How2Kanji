<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      transition: background-color .3s; /* Smooth background transition */
      padding: 20px;
    }
 
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
      margin-bottom: 20px;
    }
 
    .toggle-input {
      opacity: 0;
      width: 0;
      height: 0;
    }
 
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      border-radius: 34px;
      transition: .4s;
    }
 
    .slider:before {
      position: absolute;
      content: "🌑"; /* Moon (off) */
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      border-radius: 50%;
      transition: .4s;
    }
 
    .toggle-input:checked + .slider {
      background-color: #2c3e50; /* Dark blue for "on" */
    }
 
    .toggle-input:checked + .slider:before {
      transform: translateX(26px);
      content: "☀️"; /* Sun (on) */
    }
 
    .toggle-input:focus + .slider {
      box-shadow: 0 0 1px #2c3e50;
    }
  </style>
</head>
<body>
  <h1>Dark Mode Toggle</h1>
  <label class="toggle-switch">
    <input 
      type="checkbox" 
      class="toggle-input" 
      id="darkModeToggle" 
      aria-label="Enable dark mode" 
      aria-checked="false"
    >
    <span class="slider"></span>
  </label>
  <p id="statusMessage">Dark mode is OFF</p>
 
  <script>
    const toggleInput = document.getElementById('darkModeToggle');
    const statusMessage = document.getElementById('statusMessage');
    const body = document.body;
 
    // Callback: Updates UI when toggle state changes
    function handleDarkModeChange(isOn) {
      // Update page background
      body.style.backgroundColor = isOn ? '#2c3e50' : '#ffffff';
      body.style.color = isOn ? '#ffffff' : '#000000';
      // Update status message
      statusMessage.textContent = `Dark mode is ${isOn ? 'ON' : 'OFF'}`;
      // Log state (for debugging)
      console.log(`Dark mode: ${isOn}`);
    }
 
    // Listen for toggle changes
    toggleInput.addEventListener('change', () => {
      const isOn = toggleInput.checked;
      toggleInput.setAttribute('aria-checked', isOn);
      handleDarkModeChange(isOn);
    });
  </script>
</body>
</html>
